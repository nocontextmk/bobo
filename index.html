<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi-Chauffeur Prüfung</title>
    <style>
        :root {
            --primary-color: #f39c12;
            --dark-color: #2c3e50;
            --light-bg: #f8f9fa;
            --success-color: #2ecc71;
            --danger-color: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light-bg);
            color: #333;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: var(--dark-color);
            border-bottom: 3px solid var(--primary-color);
            padding-bottom: 10px;
            margin-top: 0;
        }

        .menu {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        @media (max-width: 600px) {
            .menu {
                grid-template-columns: 1fr;
            }
        }

        button {
            background-color: var(--dark-color);
            color: white;
            border: none;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: var(--primary-color);
            transform: translateY(-2px);
        }

        button.active {
            background-color: var(--primary-color);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }

        .quiz-section {
            display: none;
        }

        .question-card {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .question-text {
            font-size: 18px;
            font-weight: 600;
            color: var(--dark-color);
            margin-bottom: 15px;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-item {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: background 0.2s;
        }

        .option-item:hover {
            background-color: #f0f0f0;
        }

        .option-item input {
            margin-right: 15px;
            transform: scale(1.3);
            cursor: pointer;
        }

        #submit-btn {
            display: block;
            width: 100%;
            background-color: var(--success-color);
            margin-top: 25px;
        }

        #submit-btn:hover {
            background-color: #27ae60;
        }

        .results {
            display: none;
            padding: 25px;
            border-radius: 6px;
            margin-top: 25px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
        }

        .passed {
            background-color: #d4edda;
            color: #155724;
            border: 2px solid var(--success-color);
        }

        .failed {
            background-color: #f8d7da;
            color: #721c24;
            border: 2px solid var(--danger-color);
        }

        .correct-answer {
            background-color: #d4edda !important;
            border-color: var(--success-color) !important;
            font-weight: bold;
        }

        .wrong-answer {
            background-color: #f8d7da !important;
            border-color: var(--danger-color) !important;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Taxi-Chauffeur Theorieprüfung</h1>
    
    <!-- Избор на Категорија -->
    <div class="menu">
        <button onclick="startQuiz(1)" id="btn-1">Test 1</button>
        <button onclick="startQuiz(2)" id="btn-2">Test 2</button>
        <button onclick="startQuiz(3)" id="btn-3">Test 3</button>
        <button onclick="startQuiz('random')" id="btn-random">Random Test</button>
    </div>

    <!-- Дел за Прашања -->
    <div id="quiz-container" class="quiz-section">
        <div id="questions-area"></div>
        <button id="submit-btn" onclick="checkAnswers()">Test beenden & auswerten</button>
    </div>

    <!-- Дел за Резултат -->
    <div id="results-area" class="results"></div>
</div>

<script>
    // БАЗА НА ПОДАТОЦИ СО ТВОИТЕ ПРАШАЊА
    // Овде си ги внесуваш прашањата точно во твојот стил.
    const allQuestions = [
        // --- ТЕСТ 1 ---
        {
            id: 1, 
            category: 1, 
            question: "Dürfen selbständig erwerbende Taxichauffeure während der Arbeitszeit Alkohol trinken?",
            options: {
                A: "Ja, sie entscheiden selbst.",
                B: "Nein, es ist allen Taxichauffeuren verboten.",
                C: "Nur mit Einwilligung des Arbeitgebers."
            },
            correct: "B"
        },
        {
            id: 2, 
            category: 1, 
            question: "Wer untersteht der ARV 2?",
            options: {
                A: "Nur Arbeitnehmer.",
                B: "Nur Selbständigerwerbende.",
                C: "Sowohl Arbeitnehmer als auch Selbständigerwerbende (bei regelmäßigen Transporten)."
            },
            correct: "C"
        },
        {
            id: 3,
            category: 1,
            question: "Hier dein 3. Frage-Text für Test 1...",
            options: {
                A: "Antwort A",
                B: "Antwort B",
                C: "Antwort C"
            },
            correct: "A" // Смени ја точната буква тука
        },

        // --- ТЕСТ 2 ---
        {
            id: 28, // Продолжи ги броевите по ред (id: 4, 5, 6...)
            category: 2,
            question: "Hier dein erstes Frage-Text für Test 2...",
            options: {
                A: "Option A",
                B: "Option B",
                C: "Option C"
            },
            correct: "B"
        },

        // --- ТЕСТ 3 ---
        {
            id: 40,
            category: 3,
            question: "Hier dein erstes Frage-Text für Test 3...",
            options: {
                A: "Option A",
                B: "Option B",
                C: "Option C"
            },
            correct: "C"
        }
    ];

    let currentQuestions = [];

    // Функција за автоматско мешање (Фишеров мешач)
    function shuffleArray(array) {
        let arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // Започнување на избран тест
    function startQuiz(type) {
        document.getElementById('results-area').style.display = 'none';
        document.getElementById('quiz-container').style.display = 'block';
        
        document.querySelectorAll('.menu button').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${type}`).classList.add('active');

        if (type === 'random') {
            currentQuestions = shuffleArray(allQuestions);
        } else {
            currentQuestions = allQuestions.filter(q => q.category === type);
        }

        renderQuestions();
        document.getElementById('quiz-container').scrollIntoView({ behavior: 'smooth' });
    }

    // Генератор на HTML за прашањата
    function renderQuestions() {
        const area = document.getElementById('questions-area');
        area.innerHTML = '';

        currentQuestions.forEach((q, index) => {
            let optionsHTML = '';
            for (let letter in q.options) {
                optionsHTML += `
                    <label class="option-item" id="label-${q.id}-${letter}">
                        <input type="radio" name="question-${q.id}" value="${letter}">
                        <strong>${letter}:</strong> &nbsp; ${q.options[letter]}
                    </label>
                `;
            }

            area.innerHTML += `
                <div class="question-card" id="card-${q.id}">
                    <div class="question-text">${index + 1}. ${q.question}</div>
                    <div class="options-list">${optionsHTML}</div>
                </div>
            `;
        });
    }

    // Евалуација и проверка за максимум 3 грешки
    function checkAnswers() {
        let errors = 0;

        currentQuestions.forEach(q => {
            const selectedOption = document.querySelector(`input[name="question-${q.id}"]:checked`);
            
            for (let letter in q.options) {
                document.getElementById(`label-${q.id}-${letter}`).classList.remove('correct-answer', 'wrong-answer');
            }

            if (selectedOption) {
                const userAnswer = selectedOption.value;
                if (userAnswer !== q.correct) {
                    errors++;
                    document.getElementById(`label-${q.id}-${userAnswer}`).classList.add('wrong-answer');
                }
                document.getElementById(`label-${q.id}-${q.correct}`).classList.add('correct-answer');
            } else {
                errors++;
                document.getElementById(`label-${q.id}-${q.correct}`).classList.add('correct-answer');
            }
        });

        const resultsArea = document.getElementById('results-area');
        resultsArea.style.display = 'block';

        if (errors <= 3) {
            resultsArea.className = "results passed";
            resultsArea.innerHTML = `BESTANDEN! 🎉<br>Anzahl der Fehler: ${errors} (Erlaubt: max. 3)`;
        } else {
            resultsArea.className = "results failed";
            resultsArea.innerHTML = `NICHT BESTANDEN. ❌<br>Anzahl der Fehler: ${errors} (Erlaubt: max. 3)<br>Versuchen Sie es noch einmal!`;
        }

        resultsArea.scrollIntoView({ behavior: 'smooth' });
    }
</script>

</body>
</html>
